<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure Bagage - OUIGO</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>

  <style>
    /* ── DESIGN SYSTEM - ADN OUIGO ── */
    :root {
      --ouigo-pink: #FF3FA6;
      --ouigo-cyan: #00E5FF;
      --ouigo-blue: #001489; /* Bleu foncé pour le texte */
      --bg-light: #F8F9FA;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: var(--bg-light);
      color: var(--ouigo-blue);
      overflow-x: hidden;
      transition: background-color 0.3s ease;
    }

    /* Cette classe rend le fond transparent pour voir la caméra */
    body.camera-active {
      background-color: transparent !important;
      overflow: hidden;
    }

    /* ── PAGE D'ACCUEIL ── */
    #home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    #home-screen h1 {
      font-size: 32px;
      margin-bottom: 15px;
      color: var(--ouigo-blue);
    }

    #home-screen p {
      font-size: 16px;
      margin-bottom: 40px;
      color: #555;
      max-width: 320px;
      line-height: 1.4;
    }

    .btn-home {
      width: 100%;
      max-width: 320px;
      padding: 18px 20px;
      margin-bottom: 20px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-home:active { transform: scale(0.96); }

    .btn-ar { background-color: var(--ouigo-cyan); color: var(--ouigo-blue); }
    .btn-yolo { background-color: var(--ouigo-pink); color: white; }

    /* ── BOUTON RETOUR COMMUN ── */
    .btn-back {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.9);
      color: var(--ouigo-blue);
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: bold;
      z-index: 100;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* ── UI AR (Three.js) ── */
    #ar-screen { display: none; width: 100vw; height: 100vh; position: relative; }
    #ar-ui-layer {
      position: absolute; top: 70px; left: 0; width: 100%;
      pointer-events: none; z-index: 10; text-align: center;
    }
    #ar-info {
      font-size: 16px; font-weight: bold; color: var(--ouigo-blue);
      background: rgba(0, 229, 255, 0.9); padding: 12px 20px; 
      border-radius: 15px; display: inline-block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    
    /* Personnalisation du bouton AR officiel de Three.js */
    #ARButton {
      background-color: var(--ouigo-cyan) !important;
      color: var(--ouigo-blue) !important;
      border-radius: 30px !important;
      font-weight: bold !important;
      border: none !important;
      bottom: 30px !important;
      padding: 15px 30px !important;
      opacity: 1 !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
    }

    /* ── UI YOLO (Photo/Référence) ── */
    #yolo-screen { display: none; width: 100vw; height: 100vh; position: relative; }
    #yolo-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; overflow: hidden; }
    #video, #canvas-live, #canvas-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas-photo { display: none; }

    #yolo-status {
      position: absolute; top: 70px; left: 0; width: 100%; text-align: center;
      color: white; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); z-index: 10;
    }

    #yolo-btn-bar {
      position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;
    }
    .btn-action {
      padding: 15px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 30px; 
      cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    #btn-capture  { background: var(--ouigo-cyan); color: var(--ouigo-blue); }
    #btn-retake   { background: white; color: var(--ouigo-blue); }
    #btn-measure  { background: var(--ouigo-pink); color: white; }

    #yolo-result {
      position: absolute; top: 130px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); border-radius: 20px; padding: 25px 20px; 
      display: none; text-align: center; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      color: var(--ouigo-blue); width: 90%; max-width: 320px;
    }
    #res-class { font-size: 18px; margin-bottom: 5px; }
    .dim-row { font-size: 32px; font-weight: bold; margin: 5px 0; color: var(--ouigo-pink); }
    .dim-label { font-size: 13px; color: #666; margin-bottom: 20px; }
    #cabin-check { padding: 12px; border-radius: 12px; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

  <div id="home-screen">
    <h1>Contrôle Bagage</h1>
    <p>Vérifiez rapidement si votre valise ou sac à dos passe en cabine avec nos outils.</p>

    <button class="btn-home btn-ar" onclick="startAR()">
      <span style="font-size: 20px;">📱</span> Mesure AR (Automatique)
    </button>

    <button class="btn-home btn-yolo" onclick="startYOLO()">
      <span style="font-size: 20px;">⚽</span> Mesure avec un Objet
    </button>
  </div>


  <div id="ar-screen">
    <button class="btn-back" onclick="window.location.reload()">← Accueil</button>
    <div id="ar-ui-layer">
      <div id="ar-info">1. Appuyez sur START AR<br>2. Visez le sol</div>
    </div>
  </div>


  <div id="yolo-screen">
    <button class="btn-back" onclick="window.location.reload()">← Accueil</button>
    <div id="yolo-status">Chargement de l'intelligence artificielle...</div>

    <div id="yolo-container">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas-live"></canvas>
      <canvas id="canvas-photo"></canvas>
    </div>

    <div id="yolo-result">
      <h3 id="res-class"></h3>
      <div class="dim-row" id="res-dims"></div>
      <div class="dim-label">largeur × hauteur (cm)</div>
      <div id="cabin-check"></div>
    </div>

    <div id="yolo-btn-bar">
      <button id="btn-capture" class="btn-action" onclick="capturePhoto()" style="display:none;">📸 Capturer</button>
      <button id="btn-retake" class="btn-action" onclick="retake()" style="display:none;">🔄 Reprendre</button>
      <button id="btn-measure" class="btn-action" onclick="measure()" style="display:none;">📏 Mesurer</button>
    </div>
  </div>


  <script type="module">
    import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

    // Transition de l'accueil vers l'AR
    window.startAR = function() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('ar-screen').style.display = 'block';
      document.body.classList.add('camera-active');
      initAR();
    };

    let scene, camera, renderer, reticle;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let points = [];
    const arInfoDiv = document.getElementById('ar-info');

    function initAR() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
      scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      
      // CORRECTION 1 : On attache le canvas au body (comme dans ton code qui marche)
      // On lui donne une position absolue et un z-index bas pour qu'il reste en fond
      renderer.domElement.style.position = 'absolute';
      renderer.domElement.style.top = '0';
      renderer.domElement.style.left = '0';
      renderer.domElement.style.zIndex = '-1';
      document.body.appendChild(renderer.domElement);

      // CORRECTION 2 : On cible UNIQUEMENT l'interface transparente (#ar-ui-layer) pour l'overlay qu'on
      const arButton = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.getElementById('ar-ui-layer') } // C'est ici la clé !
      });
      document.getElementById('ar-screen').appendChild(arButton);

      reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x00E5FF }) // Cyan OUIGO
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      const controller = renderer.xr.getController(0);
      controller.addEventListener('select', onSelect);
      scene.add(controller);

      renderer.setAnimationLoop(renderAR);
    }

    function onSelect() {
      if (!reticle.visible) return;
      const position = new THREE.Vector3();
      position.setFromMatrixPosition(reticle.matrix);

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.02, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xFF3FA6 }) // Pink OUIGO
      );
      sphere.position.copy(position);
      scene.add(sphere);
      points.push(position);

      if (points.length === 1) {
        arInfoDiv.innerHTML = "📍 1er Point fixé.<br>Cliquez sur le 2ème point.";
      } else if (points.length === 2) {
        const distanceMetres = points[0].distanceTo(points[1]);
        const distanceCm = (distanceMetres * 100).toFixed(1);
        arInfoDiv.innerHTML = `📏 Distance : ${distanceCm} cm<br><span style="font-size:12px; font-weight:normal;">Rechargez la page pour recommencer</span>`;
        
        // --- MISE À JOUR DU MESSAGE AR ---
        arInfoDiv.style.pointerEvents = "auto"; // Permet de lire le texte
        arInfoDiv.innerHTML = `
          <div style="font-size: 24px; color: var(--ouigo-pink);">📏 ${distanceCm} cm</div>
          <div style="font-size: 13px; margin-top: 10px; font-style: italic; color: #555;">
            Ceci est une estimation "à la louche" ! 📏 Ces mesures ne remplacent pas l\'oeil avisé du contrôleur.<br><br>
            Si ta valise est une vraie baroudeuse, notre option <b>Bagage XL est dispo à seulement 5€</b> par trajet.
          </div>
          <button onclick="window.location.reload()" style="margin-top:15px; padding:10px; border-radius:20px; border:none; background:var(--ouigo-blue); color:white;">Recommencer</button>
        `;

        const material = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 4 });
        const geometry = new THREE.BufferGeometry().setFromPoints([points[0], points[1]]);
        scene.add(new THREE.Line(geometry, material));
      }
    }

    function renderAR(timestamp, frame) {
      if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (hitTestSourceRequested === false) {
          session.requestReferenceSpace('viewer').then((viewerSpace) => {
            session.requestHitTestSource({ space: viewerSpace }).then((source) => { hitTestSource = source; });
          });
          session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; });
          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length) {
            const hit = hitTestResults[0];
            reticle.visible = true;
            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }
      renderer.render(scene, camera);
    }
  </script>

  <script>
    const TARGET_CLASSES = [24, 28, 32, 72];
    const CLASS_INFO = {
      24: { label: 'Sac à dos',      color: '#00E5FF' },
      28: { label: 'Valise',         color: '#00E5FF' },
      32: { label: 'Ballon de foot', color: '#FF3FA6' },
      72: { label: 'Valise',         color: '#00E5FF' }
    };
    const BALL_D_MM = 220.0;
    const CABIN_MAX_W_CM = 55;
    const CABIN_MAX_H_CM = 35;

    let model, animId;
    let lastDetections = [];
    let photoImg = null;
    let bagBox = null, ballBox = null;
    let detectionBoxes = [];

    const video = document.getElementById('video');
    const canvasLive = document.getElementById('canvas-live');
    const canvasPhoto = document.getElementById('canvas-photo');
    let ctxLive, ctxPhoto;
    const yoloStatus = document.getElementById('yolo-status');

    // Transition de l'accueil vers YOLO
    window.startYOLO = function() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('yolo-screen').style.display = 'block';
      document.body.classList.add('camera-active');

      ctxLive = canvasLive.getContext('2d');
      ctxPhoto = canvasPhoto.getContext('2d');

      initYOLO();
    };

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      return new Promise(r => video.onloadedmetadata = r);
    }

    async function initYOLO() {
      yoloStatus.textContent = 'Accès à la caméra...';
      await setupCamera();
      yoloStatus.textContent = 'Chargement de l\'IA...';
      try {
        model = await tf.loadGraphModel('./model/model.json');
        yoloStatus.textContent = 'Placez le ballon ⚽ à côté du bagage';
        document.getElementById('btn-capture').style.display = 'inline-block';
        detectLoop();
      } catch(e) {
        yoloStatus.textContent = 'Erreur : Impossible de charger le modèle.';
      }
    }

    async function parseYOLO(rawOutput) {
      let tensor = rawOutput;
      if (Array.isArray(tensor)) tensor = tensor[0];
      if (!(tensor instanceof tf.Tensor)) tensor = tensor[Object.keys(tensor)[0]];

      let res;
      const shape = tensor.shape;
      if (shape.length === 3 && shape[1] === 84) {
        res = tensor.transpose([0, 2, 1]).squeeze();
      } else if (shape.length === 3 && shape[2] === 84) {
        res = tensor.squeeze();
      } else {
        try { res = tensor.transpose([0, 2, 1]).squeeze(); } catch { res = tensor.squeeze(); }
      }

      const rawBoxes = res.slice([0, 0], [-1, 4]);
      const rawScores = res.slice([0, 4], [-1, 80]);
      const maxScores = rawScores.max(1);
      const classIdx = rawScores.argMax(1).dataSync();

      const [xc, yc, w, h] = tf.split(rawBoxes, 4, 1);
      const y1 = yc.sub(h.div(2)), x1 = xc.sub(w.div(2));
      const y2 = yc.add(h.div(2)), x2 = xc.add(w.div(2));
      const boxes = tf.concat([y1, x1, y2, x2], 1);

      let nmsIdx = await tf.image.nonMaxSuppressionAsync(boxes, maxScores, 10, 0.5, 0.05);
      let idxArr = nmsIdx.arraySync();
      const boxArr = boxes.arraySync();
      const scrArr = await maxScores.data();

      return idxArr
        .map(i => ({ box: boxArr[i], score: scrArr[i], cls: classIdx[i] }))
        .filter(d => TARGET_CLASSES.includes(d.cls) && d.score > 0.05);
    }

    function detectLoop() {
      canvasLive.width = video.videoWidth || 640;
      canvasLive.height = video.videoHeight || 480;

      async function frame() {
        if (!model || video.paused || video.ended) { animId = requestAnimationFrame(frame); return; }
        tf.engine().startScope();
        try {
          const img = tf.browser.fromPixels(video);
          const resized = tf.image.resizeBilinear(img, [640, 640]);
          const input = resized.div(255.0).expandDims(0);
          const output = model.execute(input);
          const dets = await parseYOLO(output);
          lastDetections = dets;
          renderLive(dets);
        } catch(e) {}
        tf.engine().endScope();
        animId = requestAnimationFrame(frame);
      }
      animId = requestAnimationFrame(frame);
    }

    function renderLive(dets) {
      ctxLive.clearRect(0, 0, canvasLive.width, canvasLive.height);
      const sx = canvasLive.width / 640;
      const sy = canvasLive.height / 640;
      const hasBall = dets.some(d => d.cls === 32);
      const hasBag = dets.some(d => [24, 28, 72].includes(d.cls));

      dets.forEach(d => {
        let [y1, x1, y2, x2] = d.box;
        x1 *= sx; x2 *= sx; y1 *= sy; y2 *= sy;
        const info = CLASS_INFO[d.cls];
        ctxLive.strokeStyle = info.color;
        ctxLive.lineWidth = 4;
        ctxLive.strokeRect(x1, y1, x2 - x1, y2 - y1);
      });

      if (hasBall && hasBag) {
        yoloStatus.textContent = '✅ Parfait ! Prenez la photo.';
        yoloStatus.style.color = '#00FF99';
      } else {
        yoloStatus.textContent = 'Visez le bagage et le ballon ⚽';
        yoloStatus.style.color = 'white';
      }
    }

    window.capturePhoto = async function() {
      cancelAnimationFrame(animId);
      video.pause();

      canvasPhoto.width = video.videoWidth;
      canvasPhoto.height = video.videoHeight;
      ctxPhoto.drawImage(video, 0, 0);

      bagBox = null; ballBox = null; detectionBoxes = [];
      yoloStatus.textContent = 'Analyse de l\'image...';

      let dets = [];
      tf.engine().startScope();
      try {
        const img = tf.browser.fromPixels(canvasPhoto);
        const resized = tf.image.resizeBilinear(img, [640, 640]);
        const input = resized.div(255.0).expandDims(0);
        const output = model.execute(input);
        dets = await parseYOLO(output);
      } catch(e) {}
      tf.engine().endScope();

      if (dets.length === 0) dets = lastDetections; // Fallback sur la dernière image vidéo

      const sx = canvasPhoto.width / 640;
      const sy = canvasPhoto.height / 640;
      detectionBoxes = dets.map(d => {
        let [y1, x1, y2, x2] = d.box;
        return { x1: x1*sx, y1: y1*sy, x2: x2*sx, y2: y2*sy, cls: d.cls, score: d.score };
      });

      const ballDets = detectionBoxes.filter(d => d.cls === 32);
      if (ballDets.length) ballBox = ballDets.reduce((a,b) => b.score>a.score?b:a);
      const bagDets = detectionBoxes.filter(d => [24,28,72].includes(d.cls));
      if (bagDets.length) bagBox = bagDets.reduce((a,b) => b.score>a.score?b:a);

      drawDetections();

      video.style.display = 'none';
      canvasLive.style.display = 'none';
      canvasPhoto.style.display = 'block';

      document.getElementById('btn-capture').style.display = 'none';
      document.getElementById('btn-retake').style.display = 'inline-block';
      document.getElementById('btn-measure').style.display = (ballBox && bagBox) ? 'inline-block' : 'none';

      if (bagBox && ballBox) yoloStatus.textContent = '✅ Objets détectés. Vous pouvez mesurer.';
      else yoloStatus.textContent = '❌ Objet manquant, veuillez reprendre la photo.';
    };

    function drawDetections() {
      detectionBoxes.forEach(d => {
        const info = CLASS_INFO[d.cls];
        ctxPhoto.strokeStyle = info.color;
        ctxPhoto.lineWidth = d.cls === 32 ? 6 : 4;
        ctxPhoto.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
      });
    }

    window.measure = function() {
      if (!ballBox || !bagBox) return;
      const ballWpx = ballBox.x2 - ballBox.x1;
      const ballHpx = ballBox.y2 - ballBox.y1;
      const ratio = ((ballWpx / BALL_D_MM) + (ballHpx / BALL_D_MM)) / 2;
      const bagWcm = (((bagBox.x2 - bagBox.x1) / ratio) / 10).toFixed(1);
      const bagHcm = (((bagBox.y2 - bagBox.y1) / ratio) / 10).toFixed(1);

      const fitsCabin = bagWcm <= CABIN_MAX_W_CM && bagHcm <= CABIN_MAX_H_CM;
      const cabinDiv = document.getElementById('cabin-check');

      if (fitsCabin) {
        cabinDiv.textContent = '✅ Format Cabine OK';
        cabinDiv.style.background = 'rgba(0, 229, 255, 0.2)';
        cabinDiv.style.color = 'var(--ouigo-blue)';
      } else {
        cabinDiv.textContent = '❌ Ça risque d\'être serré !';
        cabinDiv.style.background = 'rgba(255, 63, 166, 0.2)';
        cabinDiv.style.color = 'var(--ouigo-pink)';
      }
    // AJOUT DU MESSAGE OUIGO "FEEL GOOD"
    const disclaimer = document.createElement('p');
    disclaimer.style.fontSize = '12px';
    disclaimer.style.marginTop = '15px';
    disclaimer.style.color = 'var(--ouigo-blue)';
    disclaimer.style.fontStyle = 'italic';
    disclaimer.innerHTML = 'Ceci est une estimation "à la louche" ! 📏 Ces mesures ne remplacent pas l\'oeil avisé du contrôleur. Si ta valise est une vraie baroudeuse, notre option <b>Bagage XL est dispo à seulement 5€</b> par trajet.';
    
    // On s'assure de ne pas ajouter le message en double si on clique plusieurs fois
    if (!document.getElementById('disclaimer-text')) {
        disclaimer.id = 'disclaimer-text';
        cabinDiv.appendChild(disclaimer);
    }

      document.getElementById('res-class').textContent = CLASS_INFO[bagBox.cls].label;
      document.getElementById('res-dims').textContent = `${bagWcm} × ${bagHcm}`;
      document.getElementById('yolo-result').style.display = 'block';
      yoloStatus.textContent = '';
      document.getElementById('btn-measure').style.display = 'none';
    };

    window.retake = function() {
      bagBox = null; ballBox = null; photoImg = null; detectionBoxes = [];
      canvasPhoto.style.display = 'none';
      canvasLive.style.display = 'block';
      video.style.display = 'block';
      video.play();
      document.getElementById('btn-capture').style.display = 'inline-block';
      document.getElementById('btn-retake').style.display = 'none';
      document.getElementById('btn-measure').style.display = 'none';
      document.getElementById('yolo-result').style.display = 'none';
      yoloStatus.textContent = 'Visez le bagage et le ballon ⚽';
      detectLoop();
    };
  </script>
</body>
</html>
