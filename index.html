<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure Bagage - MediaPipe Fix</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13002F; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h2 { font-size: 18px; font-weight: 500; padding: 14px 0 4px; }
    #status { color: #ff3fa5; font-weight: bold; font-size: 13px; min-height: 20px; text-align: center; padding: 0 16px 8px; }
    #container { position: relative; width: 100vw; flex: 1; background: #000; }
    video, #canvas-live, #canvas-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas-photo { display: none; }
    #btn-bar { width: 100%; display: flex; justify-content: center; gap: 10px; padding: 12px 16px; background: rgba(19,0,47,0.95); }
    button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
    #btn-capture { background: #4CAF50; color: white; }
    #btn-retake  { background: #888; color: white; }
    #btn-measure { background: #FF9800; color: white; }
    #result { width: 100%; background: rgba(255,255,255,0.08); padding: 14px 20px; display: none; text-align: center; }
  </style>
</head>
<body>

<h2>Mesure Bagage (MediaPipe 10%) _ debug</h2>
<div id="status">Initialisation...</div>

<div id="container" style="height: 60vh;">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas-live"></canvas>
  <canvas id="canvas-photo"></canvas>
</div>

<div id="btn-bar">
  <button id="btn-capture" onclick="capturePhoto()">📸 Capturer</button>
  <button id="btn-retake"  onclick="retake()"       style="display:none">🔄 Reprendre</button>
  <button id="btn-measure" onclick="measure()"      style="display:none">📏 Mesurer</button>
</div>

<div id="result">
  <h3 id="res-class" style="color:#FF3FA6"></h3>
  <div id="res-dims" style="font-size: 24px; font-weight: bold; margin: 5px 0;"></div>
  <div id="cabin-check" style="font-weight: bold; margin-top: 10px; padding: 8px; border-radius: 5px;"></div>
</div>

<script>
// Variables globales
let objectDetector;
let lastDetections = [];
let ballBox = null;
let bagBox = null;

const video = document.getElementById('video');
const canvasLive = document.getElementById('canvas-live');
const canvasPhoto = document.getElementById('canvas-photo');
const ctxLive = canvasLive.getContext('2d');
const ctxPhoto = canvasPhoto.getContext('2d');
const statusDiv = document.getElementById('status');

const BALL_D_MM = 220.0;
const BAG_CLASSES = ['backpack', 'suitcase', 'refrigerator'];
const BALL_CLASS = 'sports ball';

async function init() {
    // 1. Lancer la caméra immédiatement
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 1280, height: 720 }
        });
        video.srcObject = stream;
        statusDiv.textContent = "Caméra OK - Chargement IA...";
    } catch (err) {
        statusDiv.textContent = "Erreur Caméra : " + err.message;
        return;
    }

    // 2. Charger MediaPipe (Utilisation de tasksVision directement)
    try {
        const vision = await tasksVision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        
        objectDetector = await tasksVision.ObjectDetector.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`,
                delegate: "GPU"
            },
            scoreThreshold: 0.1, // Ton seuil de 10%
            runningMode: "VIDEO"
        });
        
        statusDiv.textContent = "Prêt ! Cherche le ballon et le sac.";
        
        video.onloadedmetadata = () => {
            canvasLive.width = video.videoWidth;
            canvasLive.height = video.videoHeight;
            detectLoop();
        };
    } catch (err) {
        statusDiv.textContent = "Erreur IA : " + err.message;
    }
}

async function detectLoop() {
    if (!objectDetector || video.paused) return;

    const detections = await objectDetector.detectForVideo(video, performance.now());
    
    lastDetections = detections.detections.map(d => ({
        class: d.categories[0].categoryName,
        score: d.categories[0].score,
        bbox: [d.boundingBox.originX, d.boundingBox.originY, d.boundingBox.width, d.boundingBox.height]
    })).filter(d => BAG_CLASSES.includes(d.class) || d.class === BALL_CLASS);

    renderLive();
    requestAnimationFrame(detectLoop);
}

function renderLive() {
    ctxLive.clearRect(0, 0, canvasLive.width, canvasLive.height);
    lastDetections.forEach(d => {
        const [x, y, w, h] = d.bbox;
        ctxLive.strokeStyle = (d.class === BALL_CLASS) ? '#FF3FA6' : '#00E5FF';
        ctxLive.lineWidth = 4;
        ctxLive.strokeRect(x, y, w, h);
    });
    
    const hasBall = lastDetections.some(d => d.class === BALL_CLASS);
    const hasBag = lastDetections.some(d => BAG_CLASSES.includes(d.class));
    if (hasBall && hasBag) {
        statusDiv.textContent = "✅ Objets détectés - Capturez !";
        statusDiv.style.color = "#00FF99";
    }
}

window.capturePhoto = () => {
    video.pause();
    canvasPhoto.width = video.videoWidth;
    canvasPhoto.height = video.videoHeight;
    ctxPhoto.drawImage(video, 0, 0);

    ballBox = lastDetections.find(d => d.class === BALL_CLASS);
    bagBox = lastDetections.sort((a,b) => b.score - a.score).find(d => BAG_CLASSES.includes(d.class));

    lastDetections.forEach(d => {
        const [x, y, w, h] = d.bbox;
        ctxPhoto.strokeStyle = (d.class === BALL_CLASS) ? '#FF3FA6' : '#00E5FF';
        ctxPhoto.lineWidth = 5;
        ctxPhoto.strokeRect(x, y, w, h);
    });

    canvasLive.style.display = 'none';
    canvasPhoto.style.display = 'block';
    document.getElementById('btn-capture').style.display = 'none';
    document.getElementById('btn-retake').style.display = 'inline-block';
    if (ballBox && bagBox) document.getElementById('btn-measure').style.display = 'inline-block';
};

window.measure = () => {
    const ballRatio = ((ballBox.bbox[2] / BALL_D_MM) + (ballBox.bbox[3] / BALL_D_MM)) / 2;
    const wCm = (bagBox.bbox[2] / ballRatio / 10).toFixed(1);
    const hCm = (bagBox.bbox[3] / ballRatio / 10).toFixed(1);

    document.getElementById('res-class').textContent = bagBox.class === 'suitcase' ? 'VALISE' : 'SAC À DOS';
    document.getElementById('res-dims').textContent = `${wCm} cm × ${hCm} cm`;
    
    const fits = wCm <= 55 && hCm <= 35;
    const cabin = document.getElementById('cabin-check');
    cabin.textContent = fits ? "✅ FORMAT CABINE OK" : "❌ TROP GRAND";
    cabin.style.background = fits ? "rgba(0,255,100,0.2)" : "rgba(255,0,0,0.2)";
    document.getElementById('result').style.display = 'block';
};

window.retake = () => {
    document.getElementById('result').style.display = 'none';
    document.getElementById('btn-measure').style.display = 'none';
    document.getElementById('btn-retake').style.display = 'none';
    document.getElementById('btn-capture').style.display = 'inline-block';
    canvasPhoto.style.display = 'none';
    canvasLive.style.display = 'block';
    video.play();
    detectLoop();
};

// Lancement
init();
</script>
</body>
</html>
