<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure AR Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* Zéro fioriture, fond transparent obligatoire pour voir la caméra */
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: transparent; 
      font-family: sans-serif; 
    }
    
    /* L'interface qui flotte par-dessus la caméra */
    #ui-layer {
      position: absolute; 
      top: 10px; 
      left: 10px; 
      right: 10px;
      color: white; 
      text-shadow: 1px 1px 3px black; /* Pour rester lisible sur la vidéo */
      pointer-events: none; /* Laisse passer les clics vers la 3D */
      z-index: 10;
    }

    h1 { font-size: 18px; margin-bottom: 5px; }
    #info { font-size: 16px; font-weight: bold; color: #00FF99; }
  </style>
</head>
<body>

  <div id="ui-layer">
    <h1>Test AR Basique</h1>
    <div id="info">1. Appuie sur START AR en bas.<br>2. Vise le sol.</div>
  </div>

  <script type="module">
    import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

    let scene, camera, renderer, reticle;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let points = []; 

    const infoDiv = document.getElementById('info');

    init();

    function init() {
      // 1. Scène et Caméra
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
      scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

      // 2. Rendu WebGL (alpha: true est crucial pour voir la caméra)
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // 3. Bouton AR avec DomOverlay pour garder le texte visible
      document.body.appendChild(ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.getElementById('ui-layer') }
      }));

      // 4. Le viseur (réticule) pour le sol
      reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x00FF00 })
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      // 5. Interaction (clic sur l'écran)
      const controller = renderer.xr.getController(0);
      controller.addEventListener('select', onSelect);
      scene.add(controller);

      renderer.setAnimationLoop(render);
    }

    function onSelect() {
      if (!reticle.visible) return;

      // Récupère la position cliquée
      const position = new THREE.Vector3();
      position.setFromMatrixPosition(reticle.matrix);

      // Place un point visuel (sphère rouge)
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.02, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      sphere.position.copy(position);
      scene.add(sphere);
      points.push(position);

      if (points.length === 1) {
        infoDiv.innerHTML = "Point 1 fixé.<br>Clique sur un 2ème point pour mesurer.";
      } else if (points.length === 2) {
        // Calcule la distance entre les deux points
        const distanceMetres = points[0].distanceTo(points[1]);
        const distanceCm = (distanceMetres * 100).toFixed(1);
        
        infoDiv.innerHTML = `Distance mesurée : ${distanceCm} cm<br>Recharge la page pour recommencer.`;

        // Trace une ligne entre les deux points
        const material = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
        const geometry = new THREE.BufferGeometry().setFromPoints([points[0], points[1]]);
        scene.add(new THREE.Line(geometry, material));
      }
    }

    function render(timestamp, frame) {
      if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (hitTestSourceRequested === false) {
          session.requestReferenceSpace('viewer').then((viewerSpace) => {
            session.requestHitTestSource({ space: viewerSpace }).then((source) => {
              hitTestSource = source;
            });
          });
          session.addEventListener('end', () => {
            hitTestSourceRequested = false;
            hitTestSource = null;
          });
          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if (hitTestResults.length) {
            const hit = hitTestResults[0];
            reticle.visible = true;
            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
