<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure Bagage</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13002F; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    h2 { font-size: 18px; font-weight: 500; padding: 14px 0 4px; }

    #status { color: #FF3FA6; font-weight: bold; font-size: 13px; padding-bottom: 8px; min-height: 20px; text-align: center; padding: 0 16px 8px; }

    #container { position: relative; width: 100vw; flex: 1; }
    video, #canvas-live, #canvas-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas-photo { display: none; cursor: crosshair; touch-action: none; }

    /* ── NOUVEAU : canvas WebXR ── */
    #canvas-xr {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      touch-action: none;
    }

    #btn-bar {
      width: 100%; display: flex; justify-content: center;
      gap: 10px; padding: 12px 16px;
      background: rgba(19,0,47,0.95);
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
    }
    #btn-capture  { background: #4CAF50; color: white; }
    #btn-retake   { background: #888;    color: white; display: none; }
    /* ── SUPPRIMÉ : #btn-confirm (carte) ── */
    #btn-measure  { background: #FF9800; color: white; display: none; }
    /* ── NOUVEAU : bouton AR ── */
    #btn-ar       { background: #9C27B0; color: white; display: none; }

    #result {
      width: 100%; background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 14px 20px; display: none;
      text-align: center;
    }
    #result h3 { font-size: 16px; margin-bottom: 8px; color: #FF3FA6; }
    .dim-row { font-size: 22px; font-weight: 500; margin: 4px 0; }
    .dim-label { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    #conf { font-size: 12px; color: #888; }

    /* ── NOUVEAU : badge mode mesure ── */
    #depth-badge {
      font-size: 11px; color: #00FF99; margin-top: 4px;
    }

    #instr {
      font-size: 12px; color: #ccc; text-align: center;
      padding: 4px 16px 0; min-height: 18px;
    }

    /* ── NOUVEAU : overlay de profondeur (debug optionnel) ── */
    #depth-overlay {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #00FF99;
      font-size: 11px; padding: 4px 8px; border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>

<h2>Mesure Bagage</h2>
<div id="status">Chargement du modèle...</div>
<div id="instr"></div>

<div id="container" style="height: 60vh;">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas-live"></canvas>
  <canvas id="canvas-photo"></canvas>
  <!-- NOUVEAU : canvas dédié à la session WebXR -->
  <canvas id="canvas-xr"></canvas>
  <!-- NOUVEAU : affichage profondeur live -->
  <div id="depth-overlay">Profondeur : --</div>
</div>

<div id="btn-bar">
  <button id="btn-capture" onclick="capturePhoto()">Capturer</button>
  <button id="btn-retake"  onclick="retake()">Reprendre</button>
  <!-- SUPPRIMÉ : btn-confirm (plus besoin de confirmer la carte) -->
  <!-- NOUVEAU : bouton pour lancer la session AR de mesure -->
  <button id="btn-ar"      onclick="startARMeasure()">Mesurer en AR</button>
  <button id="btn-measure" onclick="measure()">Mesurer (fallback)</button>
</div>

<div id="result">
  <h3 id="res-class"></h3>
  <div class="dim-row" id="res-dims"></div>
  <div class="dim-label">largeur × hauteur (cm)</div>
  <div id="conf"></div>
  <!-- NOUVEAU : indique la source de la mesure -->
  <div id="depth-badge"></div>
</div>

<script>
const video       = document.getElementById('video');
const canvasLive  = document.getElementById('canvas-live');
const canvasPhoto = document.getElementById('canvas-photo');
/* NOUVEAU */
const canvasXR    = document.getElementById('canvas-xr');
const depthOverlay= document.getElementById('depth-overlay');

const ctxLive     = canvasLive.getContext('2d');
const ctxPhoto    = canvasPhoto.getContext('2d');
const statusDiv   = document.getElementById('status');
const instrDiv    = document.getElementById('instr');

const LUGGAGE_CLASSES = [24, 26, 28];
const CLASS_INFO = {
  24: { label: 'Sac à dos',  color: '#FF3FA6' },
  26: { label: 'Sac à main', color: '#00E5FF' },
  28: { label: 'Valise',     color: '#00FF99' }
};
/* SUPPRIMÉ : CARD_W_MM, CARD_H_MM — plus nécessaires */

let model, animId;
let lastDetections = [];
let photoImg = null;
/* SUPPRIMÉ : cardBox — remplacé par les données de profondeur */
let bagBox   = null;
let scale    = 1;

/* ── NOUVEAU : état WebXR ─────────────────────────────────── */
let xrSession      = null;   // session AR active
let xrRefSpace     = null;   // référentiel local
let xrDepthInfo    = null;   // dernière XRDepthInformation reçue
let xrFovHoriz     = null;   // FOV horizontal (radians) → pour conversion px→cm
let xrFovVert      = null;   // FOV vertical
let arMeasureDone  = false;
let depthAtBagBox  = null;   // { dW_cm, dH_cm } calculés via ARCore
/* ──────────────────────────────────────────────────────────── */

// ── Caméra ────────────────────────────────────────────────────
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  return new Promise(r => video.onloadedmetadata = r);
}

// ── Modèle ────────────────────────────────────────────────────
async function loadModel() {
  try {
    model = await tf.loadGraphModel('./model/model.json');
    statusDiv.textContent = 'Modèle prêt — pointe vers ton bagage';
    instrDiv.textContent  = 'Capture puis mesure via AR (S22 Ultra)';
    detectLoop();
  } catch(e) {
    statusDiv.textContent = 'Erreur chargement modèle : ' + e;
  }
}

// ── Détection en temps réel ───────────────────────────────────
function detectLoop() {
  canvasLive.width  = video.videoWidth  || 640;
  canvasLive.height = video.videoHeight || 480;

  async function frame() {
    if (!model || video.paused || video.ended) { animId = requestAnimationFrame(frame); return; }
    tf.engine().startScope();
    try {
      const img     = tf.browser.fromPixels(video);
      const resized = tf.image.resizeBilinear(img, [640, 640]);
      const input   = resized.div(255.0).expandDims(0);
      const output  = model.execute(input);
      const res     = output.transpose([0, 2, 1]).squeeze();
      const dets    = await parseYOLO(res);
      lastDetections = dets;
      renderLive(dets);
    } catch(e) {}
    tf.engine().endScope();
    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

async function parseYOLO(res) {
  const rawBoxes  = res.slice([0, 0], [-1, 4]);
  const rawScores = res.slice([0, 4], [-1, 80]);
  const maxScores = rawScores.max(1);
  const classIdx  = rawScores.argMax(1).dataSync();
  const [xc, yc, w, h] = tf.split(rawBoxes, 4, 1);
  const y1 = yc.sub(h.div(2)), x1 = xc.sub(w.div(2));
  const y2 = yc.add(h.div(2)), x2 = xc.add(w.div(2));
  const boxes = tf.concat([y1, x1, y2, x2], 1);
  const nmsIdx = await tf.image.nonMaxSuppressionAsync(boxes, maxScores, 10, 0.5, 0.4);
  const idxArr = nmsIdx.arraySync();
  const boxArr = boxes.arraySync();
  const scrArr = maxScores.arraySync();
  return idxArr
    .map(i => ({ box: boxArr[i], score: scrArr[i], cls: classIdx[i] }))
    .filter(d => LUGGAGE_CLASSES.includes(d.cls) && d.score > 0.4);
}

function renderLive(dets) {
  ctxLive.clearRect(0, 0, canvasLive.width, canvasLive.height);
  const sx = canvasLive.width  / 640;
  const sy = canvasLive.height / 640;
  dets.forEach(d => {
    let [y1, x1, y2, x2] = d.box;
    x1 *= sx; x2 *= sx; y1 *= sy; y2 *= sy;
    const info  = CLASS_INFO[d.cls];
    const label = `${info.label} (${Math.round(d.score * 100)}%)`;
    ctxLive.strokeStyle = info.color;
    ctxLive.lineWidth   = 3;
    ctxLive.strokeRect(x1, y1, x2 - x1, y2 - y1);
    ctxLive.font = 'bold 16px sans-serif';
    const tw = ctxLive.measureText(label).width;
    ctxLive.fillStyle = info.color;
    ctxLive.fillRect(x1, y1 > 24 ? y1 - 24 : 0, tw + 10, 22);
    ctxLive.fillStyle = '#000';
    ctxLive.fillText(label, x1 + 5, y1 > 24 ? y1 - 6 : 16);
  });
}

// ── Capture photo ─────────────────────────────────────────────
function capturePhoto() {
  cancelAnimationFrame(animId);
  video.pause();

  canvasPhoto.width  = video.videoWidth;
  canvasPhoto.height = video.videoHeight;
  ctxPhoto.drawImage(video, 0, 0);

  bagBox = null;
  if (lastDetections.length > 0) {
    const best = lastDetections.reduce((a, b) => b.score > a.score ? b : a);
    const sx = canvasPhoto.width  / 640;
    const sy = canvasPhoto.height / 640;
    let [y1, x1, y2, x2] = best.box;
    bagBox = { x1: x1*sx, y1: y1*sy, x2: x2*sx, y2: y2*sy, cls: best.cls, score: best.score };
    drawBagBox();
  }

  video.style.display       = 'none';
  canvasLive.style.display  = 'none';
  canvasPhoto.style.display = 'block';

  scale = canvasPhoto.width / canvasPhoto.getBoundingClientRect().width;

  document.getElementById('btn-capture').style.display = 'none';
  document.getElementById('btn-retake').style.display  = 'inline-block';

  /* MODIFIÉ : on propose AR en priorité, fallback carte supprimé */
  if (bagBox) {
    checkARSupport(); // affiche btn-ar ou btn-measure selon dispo
    statusDiv.textContent = `${CLASS_INFO[bagBox.cls].label} détecté`;
    instrDiv.textContent  = 'Lance la mesure AR pour obtenir les dimensions';
  } else {
    statusDiv.textContent = 'Aucun bagage détecté — reprends la photo';
    instrDiv.textContent  = '';
  }

  photoImg = new Image();
  photoImg.src = canvasPhoto.toDataURL();
}

function drawBagBox() {
  if (!bagBox) return;
  const info = CLASS_INFO[bagBox.cls];
  ctxPhoto.strokeStyle = info.color;
  ctxPhoto.lineWidth   = 4;
  ctxPhoto.strokeRect(bagBox.x1, bagBox.y1, bagBox.x2 - bagBox.x1, bagBox.y2 - bagBox.y1);
  ctxPhoto.font = 'bold 20px sans-serif';
  const label = `${info.label} (${Math.round(bagBox.score * 100)}%)`;
  const tw = ctxPhoto.measureText(label).width;
  ctxPhoto.fillStyle = info.color;
  ctxPhoto.fillRect(bagBox.x1, bagBox.y1 > 28 ? bagBox.y1 - 28 : 0, tw + 10, 26);
  ctxPhoto.fillStyle = '#000';
  ctxPhoto.fillText(label, bagBox.x1 + 5, bagBox.y1 > 28 ? bagBox.y1 - 6 : 20);
}

/* ═══════════════════════════════════════════════════════════════
   NOUVEAU BLOC : WebXR Depth Sensing
   Remplace entièrement la logique de sélection de carte bancaire
   ══════════════════════════════════════════════════════════════ */

/**
 * Vérifie si WebXR + depth-sensing est disponible.
 * Affiche le bon bouton en conséquence.
 */
async function checkARSupport() {
  if (navigator.xr) {
    try {
      const ok = await navigator.xr.isSessionSupported('immersive-ar');
      if (ok) {
        document.getElementById('btn-ar').style.display = 'inline-block';
        instrDiv.textContent = 'Appuie sur "Mesurer en AR" — garde le bagage dans le cadre';
        return;
      }
    } catch(e) {}
  }
  // Fallback : mesure sans profondeur (dégradé sans carte)
  document.getElementById('btn-measure').style.display = 'inline-block';
  instrDiv.textContent = 'AR non disponible — mesure approximative sans référence';
}

/**
 * Lance une session WebXR immersive-ar avec depth-sensing.
 * Récupère la profondeur au centre de la bbox bagage,
 * puis calcule largeur et hauteur réelles en cm.
 */
async function startARMeasure() {
  if (!bagBox) { statusDiv.textContent = 'Aucune bbox bagage !'; return; }

  statusDiv.textContent = 'Ouverture session AR…';
  instrDiv.textContent  = 'Garde le bagage visible à l\'écran';

  try {
    // NOUVEAU : demande de session AR avec depth-sensing obligatoire
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['depth-sensing', 'local'],
      depthSensing: {
        usagePreference:      ['cpu-optimized'],
        dataFormatPreference: ['luminance-alpha']
      }
    });
  } catch(e) {
    // depth-sensing non supporté → fallback sans référence
    statusDiv.textContent = 'Depth sensing indisponible : ' + e.message;
    instrDiv.textContent  = 'Mesure dégradée (sans profondeur)';
    document.getElementById('btn-measure').style.display = 'inline-block';
    document.getElementById('btn-ar').style.display      = 'none';
    return;
  }

  // NOUVEAU : configuration du renderer WebXR sur canvas-xr
  const gl = canvasXR.getContext('webgl', { xrCompatible: true });
  await xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
  xrRefSpace = await xrSession.requestReferenceSpace('local');

  arMeasureDone = false;
  depthAtBagBox = null;

  // NOUVEAU : boucle de rendu XR — on ne fait qu'une seule mesure
  xrSession.requestAnimationFrame(onXRFrame);

  canvasPhoto.style.display = 'none';
  canvasXR.style.display    = 'block';
  depthOverlay.style.display = 'block';
  document.getElementById('btn-ar').style.display = 'none';
}

/**
 * NOUVEAU : callback boucle XR.
 * Lit la carte de profondeur ARCore et calcule les dimensions.
 */
function onXRFrame(time, frame) {
  if (!xrSession) return;

  const pose = frame.getViewerPose(xrRefSpace);
  if (!pose || arMeasureDone) {
    xrSession.requestAnimationFrame(onXRFrame);
    return;
  }

  for (const view of pose.views) {
    // NOUVEAU : récupération de XRDepthInformation (ARCore)
    const depthInfo = frame.getDepthInformation(view);
    if (!depthInfo) continue;

    xrDepthInfo = depthInfo;

    // NOUVEAU : largeur/hauteur du canvas de profondeur (pixels ARCore)
    const dW = depthInfo.width;
    const dH = depthInfo.height;

    // NOUVEAU : coordonnées normalisées [0–1] du centre de la bbox bagage
    const cx = (bagBox.x1 + bagBox.x2) / 2 / canvasPhoto.width;
    const cy = (bagBox.y1 + bagBox.y2) / 2 / canvasPhoto.height;

    // NOUVEAU : profondeur au centre du bagage (en mètres)
    const depthM = depthInfo.getDepthInMeters(cx, cy);

    depthOverlay.textContent = `Profondeur : ${(depthM * 100).toFixed(1)} cm`;

    if (depthM <= 0 || depthM > 10) continue; // valeur invalide

    // NOUVEAU : FOV de la caméra AR (fourni par la projection XR)
    const proj  = view.projectionMatrix;
    // proj[0] = 2*near/(right-left) → fovH = 2*atan(1/proj[0])
    // proj[5] = 2*near/(top-bottom)  → fovV = 2*atan(1/proj[5])
    xrFovHoriz = 2 * Math.atan(1 / Math.abs(proj[0]));
    xrFovVert  = 2 * Math.atan(1 / Math.abs(proj[5]));

    // NOUVEAU : taille de la bbox en fraction de l'image
    const fracW = (bagBox.x2 - bagBox.x1) / canvasPhoto.width;
    const fracH = (bagBox.y2 - bagBox.y1) / canvasPhoto.height;

    // NOUVEAU : conversion en cm via tangente (projection perspective)
    // dim_réelle = 2 * distance * tan(fov/2) * fraction
    const realW_cm = (2 * depthM * Math.tan(xrFovHoriz / 2) * fracW * 100).toFixed(1);
    const realH_cm = (2 * depthM * Math.tan(xrFovVert  / 2) * fracH * 100).toFixed(1);

    depthAtBagBox = { dW_cm: parseFloat(realW_cm), dH_cm: parseFloat(realH_cm), depthM };
    arMeasureDone = true;

    // NOUVEAU : affichage du résultat et fin de session
    showResult(depthAtBagBox.dW_cm, depthAtBagBox.dH_cm, 'WebXR Depth Sensing (ARCore)');
    endARSession();
    return;
  }

  xrSession.requestAnimationFrame(onXRFrame);
}

/**
 * NOUVEAU : ferme proprement la session WebXR.
 */
function endARSession() {
  if (xrSession) {
    xrSession.end().catch(() => {});
    xrSession = null;
  }
  canvasXR.style.display    = 'none';
  canvasPhoto.style.display = 'block';
  depthOverlay.style.display = 'none';
}

/* ═══════════════════════════════════════════════════════════════
   FIN DU NOUVEAU BLOC WebXR
   ══════════════════════════════════════════════════════════════ */

/* MODIFIÉ : confirmCard() supprimé — plus de carte bancaire */

// ── Mesure fallback (sans profondeur) ─────────────────────────
/* MODIFIÉ : cette fonction est désormais le fallback dégradé.
   Elle ne peut plus utiliser de carte comme référence.
   Elle affiche un avertissement et estime via FOV fixe (~70°). */
function measure() {
  if (!bagBox) { statusDiv.textContent = 'Aucun bagage détecté.'; return; }

  // Estimation grossière : hypothèse bagage à ~1 m, FOV ~70°
  const assumedDepth = 1.0; // mètre
  const assumedFovH  = (70 * Math.PI) / 180;
  const assumedFovV  = (50 * Math.PI) / 180;

  const fracW = (bagBox.x2 - bagBox.x1) / canvasPhoto.width;
  const fracH = (bagBox.y2 - bagBox.y1) / canvasPhoto.height;

  const rW = (2 * assumedDepth * Math.tan(assumedFovH / 2) * fracW * 100).toFixed(1);
  const rH = (2 * assumedDepth * Math.tan(assumedFovV / 2) * fracH * 100).toFixed(1);

  showResult(parseFloat(rW), parseFloat(rH), 'Estimation (sans profondeur — imprécis)');
}

// ── NOUVEAU : affichage résultat unifié ───────────────────────
function showResult(wCm, hCm, source) {
  document.getElementById('res-class').textContent = CLASS_INFO[bagBox.cls].label;
  document.getElementById('res-dims').textContent  = `${wCm} × ${hCm}`;
  document.getElementById('conf').textContent      = `Confiance YOLO : ${Math.round(bagBox.score * 100)}%`;
  document.getElementById('depth-badge').textContent = `Source : ${source}`;
  document.getElementById('result').style.display  = 'block';

  statusDiv.textContent = 'Mesure terminée !';
  instrDiv.textContent  = 'Reprends si le résultat semble incorrect';
}

// ── Reprendre ─────────────────────────────────────────────────
function retake() {
  /* MODIFIÉ : suppression du reset cardBox */
  bagBox = null; photoImg = null;
  endARSession(); // NOUVEAU : assure la fermeture propre de toute session XR

  canvasPhoto.style.display = 'none';
  canvasXR.style.display    = 'none';          // NOUVEAU
  canvasLive.style.display  = 'block';
  video.style.display       = 'block';
  video.play();

  document.getElementById('btn-capture').style.display = 'inline-block';
  document.getElementById('btn-retake').style.display  = 'none';
  /* SUPPRIMÉ : reset btn-confirm */
  document.getElementById('btn-measure').style.display = 'none';
  document.getElementById('btn-ar').style.display      = 'none'; // NOUVEAU
  document.getElementById('result').style.display      = 'none';

  /* NOUVEAU : reset état AR */
  xrDepthInfo   = null;
  depthAtBagBox = null;
  arMeasureDone = false;

  statusDiv.textContent = 'Modèle prêt — pointe vers ton bagage';
  instrDiv.textContent  = 'Capture puis mesure via AR (S22 Ultra)';
  detectLoop();
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await setupCamera();
  await loadModel();
}
init();
</script>
</body>
</html>
