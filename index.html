<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure Bagage</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13002F; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    h2 { font-size: 18px; font-weight: 500; padding: 14px 0 4px; }

    #status { color: #FF3FA6; font-weight: bold; font-size: 13px; padding-bottom: 8px; min-height: 20px; text-align: center; padding: 0 16px 8px; }

    #container { position: relative; width: 100vw; flex: 1; }
    video, #canvas-live, #canvas-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas-photo { display: none; cursor: crosshair; touch-action: none; }

    #btn-bar {
      width: 100%; display: flex; justify-content: center;
      gap: 10px; padding: 12px 16px;
      background: rgba(19,0,47,0.95);
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
    }
    #btn-capture  { background: #4CAF50; color: white; }
    #btn-retake   { background: #888; color: white; display: none; }
    #btn-confirm  { background: #2196F3; color: white; display: none; }
    #btn-measure  { background: #FF9800; color: white; display: none; }

    #result {
      width: 100%; background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 14px 20px; display: none;
      text-align: center;
    }
    #result h3 { font-size: 16px; margin-bottom: 8px; color: #FF3FA6; }
    .dim-row { font-size: 22px; font-weight: 500; margin: 4px 0; }
    .dim-label { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    #conf { font-size: 12px; color: #888; }

    #instr {
      font-size: 12px; color: #ccc; text-align: center;
      padding: 4px 16px 0; min-height: 18px;
    }
  </style>
</head>
<body>

<h2>Mesure Bagage</h2>
<div id="status">Chargement du modèle...</div>
<div id="instr"></div>

<div id="container" style="height: 60vh;">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas-live"></canvas>
  <canvas id="canvas-photo"></canvas>
</div>

<div id="btn-bar">
  <button id="btn-capture"  onclick="capturePhoto()">Capturer</button>
  <button id="btn-retake"   onclick="retake()">Reprendre</button>
  <button id="btn-confirm"  onclick="confirmCard()">Confirmer la carte</button>
  <button id="btn-measure"  onclick="measure()">Mesurer</button>
</div>

<div id="result">
  <h3 id="res-class"></h3>
  <div class="dim-row" id="res-dims"></div>
  <div class="dim-label">largeur × hauteur (cm)</div>
  <div id="conf"></div>
</div>

<script>
const video       = document.getElementById('video');
const canvasLive  = document.getElementById('canvas-live');
const canvasPhoto = document.getElementById('canvas-photo');
const ctxLive     = canvasLive.getContext('2d');
const ctxPhoto    = canvasPhoto.getContext('2d');
const statusDiv   = document.getElementById('status');
const instrDiv    = document.getElementById('instr');

const TARGET_CLASSES = [24, 26, 28, 32];
const CLASS_INFO = {
  24: { label: 'Sac à dos',    color: '#FF3FA6' },
  26: { label: 'Sac à main',   color: '#00E5FF' },
  28: { label: 'Valise',       color: '#00FF99' },
  32: { label: 'Ballon de foot', color: '#FFD700' }
};
const CARD_W_MM = 85.6;
const CARD_H_MM = 54.0;
const BALL_D_MM = 220.0; // diamètre standard d'un ballon de foot

let model, animId;
let lastDetections = [];
let photoImg = null;
let cardBox  = null;
let bagBox   = null;
let ballBox  = null;
let detectionBoxes = [];
let drawing  = false;
let startX, startY, endX, endY;
let scale = 1;

// ── Caméra ────────────────────────────────────────────────────
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  return new Promise(r => video.onloadedmetadata = r);
}

// ── Modèle ────────────────────────────────────────────────────
async function loadModel() {
  try {
    model = await tf.loadGraphModel('./model/model.json');
    statusDiv.textContent = 'Modèle prêt — pointe vers ton bagage';
    instrDiv.textContent  = 'Place la carte bancaire à côté du bagage puis capture';
    detectLoop();
  } catch(e) {
    statusDiv.textContent = 'Erreur chargement modèle : ' + e;
  }
}

// ── Détection en temps réel ───────────────────────────────────
function detectLoop() {
  canvasLive.width  = video.videoWidth  || 640;
  canvasLive.height = video.videoHeight || 480;

  async function frame() {
    if (!model || video.paused || video.ended) { animId = requestAnimationFrame(frame); return; }
    tf.engine().startScope();
    try {
      const img     = tf.browser.fromPixels(video);
      const resized = tf.image.resizeBilinear(img, [640, 640]);
      const input   = resized.div(255.0).expandDims(0);
      const output  = model.execute(input);
      const res     = output.transpose([0, 2, 1]).squeeze();
      const dets    = await parseYOLO(res);
      lastDetections = dets;
      renderLive(dets);
    } catch(e) {}
    tf.engine().endScope();
    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

async function parseYOLO(res) {
  const rawBoxes  = res.slice([0, 0], [-1, 4]);
  const rawScores = res.slice([0, 4], [-1, 80]);
  const maxScores = rawScores.max(1);
  const classIdx  = rawScores.argMax(1).dataSync();
  const [xc, yc, w, h] = tf.split(rawBoxes, 4, 1);
  const y1 = yc.sub(h.div(2)), x1 = xc.sub(w.div(2));
  const y2 = yc.add(h.div(2)), x2 = xc.add(w.div(2));
  const boxes = tf.concat([y1, x1, y2, x2], 1);
  const nmsIdx = await tf.image.nonMaxSuppressionAsync(boxes, maxScores, 10, 0.5, 0.4);
  const idxArr = nmsIdx.arraySync();
  const boxArr = boxes.arraySync();
  const scrArr = maxScores.arraySync();
  return idxArr
    .map(i => ({ box: boxArr[i], score: scrArr[i], cls: classIdx[i] }))
    .filter(d => TARGET_CLASSES.includes(d.cls) && d.score > 0.4);
}

function renderLive(dets) {
  ctxLive.clearRect(0, 0, canvasLive.width, canvasLive.height);
  const sx = canvasLive.width  / 640;
  const sy = canvasLive.height / 640;
  dets.forEach(d => {
    let [y1, x1, y2, x2] = d.box;
    x1 *= sx; x2 *= sx; y1 *= sy; y2 *= sy;
    const info  = CLASS_INFO[d.cls];
    const label = `${info.label} (${Math.round(d.score * 100)}%)`;
    ctxLive.strokeStyle = info.color;
    ctxLive.lineWidth   = 3;
    ctxLive.strokeRect(x1, y1, x2 - x1, y2 - y1);
    ctxLive.font = 'bold 16px sans-serif';
    const tw = ctxLive.measureText(label).width;
    ctxLive.fillStyle = info.color;
    ctxLive.fillRect(x1, y1 > 24 ? y1 - 24 : 0, tw + 10, 22);
    ctxLive.fillStyle = '#000';
    ctxLive.fillText(label, x1 + 5, y1 > 24 ? y1 - 6 : 16);
  });
}

// ── Capture photo ─────────────────────────────────────────────
function capturePhoto() {
  cancelAnimationFrame(animId);
  video.pause();

  // Copier la frame dans canvasPhoto
  canvasPhoto.width  = video.videoWidth;
  canvasPhoto.height = video.videoHeight;
  ctxPhoto.drawImage(video, 0, 0);

  // Récupérer les meilleures bboxes depuis lastDetections
  bagBox = null;
  ballBox = null;
  detectionBoxes = [];
  if (lastDetections.length > 0) {
    const sx = canvasPhoto.width  / 640;
    const sy = canvasPhoto.height / 640;
    detectionBoxes = lastDetections.map(d => {
      let [y1, x1, y2, x2] = d.box;
      return { x1: x1 * sx, y1: y1 * sy, x2: x2 * sx, y2: y2 * sy, cls: d.cls, score: d.score };
    });

    const luggageDetections = detectionBoxes.filter(d => [24, 26, 28].includes(d.cls));
    const ballDetections = detectionBoxes.filter(d => d.cls === 32);

    if (luggageDetections.length > 0) {
      bagBox = luggageDetections.reduce((a, b) => b.score > a.score ? b : a);
    }
    if (ballDetections.length > 0) {
      ballBox = ballDetections.reduce((a, b) => b.score > a.score ? b : a);
    }

    drawDetections();
  }

  // Afficher photo, masquer vidéo+canvas live
  video.style.display       = 'none';
  canvasLive.style.display  = 'none';
  canvasPhoto.style.display = 'block';

  // Échelle d'affichage (le canvas est mis à l'échelle par CSS)
  scale = canvasPhoto.width / canvasPhoto.getBoundingClientRect().width;

  document.getElementById('btn-capture').style.display = 'none';
  document.getElementById('btn-retake').style.display  = 'inline-block';
  document.getElementById('btn-confirm').style.display = 'inline-block';
  document.getElementById('btn-measure').style.display = ballBox ? 'inline-block' : 'none';

  if (bagBox && ballBox) {
    statusDiv.textContent = `${CLASS_INFO[bagBox.cls].label} et ${CLASS_INFO[ballBox.cls].label} détectés — entoure la carte ou mesure directement avec le ballon`;
  } else if (bagBox) {
    statusDiv.textContent = `${CLASS_INFO[bagBox.cls].label} détecté — entoure la carte bancaire`;
  } else if (ballBox) {
    statusDiv.textContent = `${CLASS_INFO[ballBox.cls].label} détecté — mesure la valise avec le ballon de foot comme référence`;
  } else {
    statusDiv.textContent = 'Aucun objet détecté — entoure quand même la carte bancaire';
  }
  instrDiv.textContent = 'Glisse le doigt pour entourer la carte';

  addTouchListeners();
}

function drawDetections() {
  detectionBoxes.forEach(d => {
    const info = CLASS_INFO[d.cls];
    ctxPhoto.strokeStyle = info.color;
    ctxPhoto.lineWidth   = 4;
    ctxPhoto.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);
    ctxPhoto.font = 'bold 20px sans-serif';
    const label = `${info.label} (${Math.round(d.score * 100)}%)`;
    const tw = ctxPhoto.measureText(label).width;
    ctxPhoto.fillStyle = info.color;
    ctxPhoto.fillRect(d.x1, d.y1 > 28 ? d.y1 - 28 : 0, tw + 10, 26);
    ctxPhoto.fillStyle = '#000';
    ctxPhoto.fillText(label, d.x1 + 5, d.y1 > 28 ? d.y1 - 6 : 20);
  });
}

// ── Sélection carte (touch + mouse) ──────────────────────────
function getPos(e) {
  const rect = canvasPhoto.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scale,
    y: (src.clientY - rect.top)  * scale
  };
}

function addTouchListeners() {
  ['mousedown','touchstart'].forEach(ev => canvasPhoto.addEventListener(ev, e => {
    e.preventDefault();
    const p = getPos(e);
    startX = p.x; startY = p.y; drawing = true;
    cardBox = null;
    document.getElementById('btn-measure').style.display = 'none';
  }, { passive: false }));

  ['mousemove','touchmove'].forEach(ev => canvasPhoto.addEventListener(ev, e => {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    endX = p.x; endY = p.y;
    redrawPhoto();
    ctxPhoto.strokeStyle = '#FFD700';
    ctxPhoto.lineWidth   = 2;
    ctxPhoto.setLineDash([6, 3]);
    ctxPhoto.strokeRect(startX, startY, endX - startX, endY - startY);
    ctxPhoto.setLineDash([]);
  }, { passive: false }));

  ['mouseup','touchend'].forEach(ev => canvasPhoto.addEventListener(ev, e => {
    e.preventDefault();
    drawing = false;
    cardBox = {
      x1: Math.round(Math.min(startX, endX)),
      y1: Math.round(Math.min(startY, endY)),
      x2: Math.round(Math.max(startX, endX)),
      y2: Math.round(Math.max(startY, endY))
    };
    redrawPhoto();
    ctxPhoto.strokeStyle = '#FFD700';
    ctxPhoto.lineWidth   = 2;
    ctxPhoto.strokeRect(cardBox.x1, cardBox.y1, cardBox.x2 - cardBox.x1, cardBox.y2 - cardBox.y1);
    ctxPhoto.font = '14px sans-serif';
    ctxPhoto.fillStyle = '#FFD700';
    ctxPhoto.fillText('Carte', cardBox.x1 + 4, cardBox.y1 > 18 ? cardBox.y1 - 4 : 14);
    instrDiv.textContent = 'Vérifie le cadre jaune sur la carte puis confirme';
  }, { passive: false }));
}

function redrawPhoto() {
  ctxPhoto.clearRect(0, 0, canvasPhoto.width, canvasPhoto.height);
  ctxPhoto.drawImage(photoImg || video, 0, 0);
  drawDetections();
}

// Stocker l'image capturée pour redessiner
const _origCapture = capturePhoto;
(function patchCapture() {
  const orig = window.capturePhoto;
  window.capturePhoto = function() {
    _origCapture();
    photoImg = new Image();
    photoImg.src = canvasPhoto.toDataURL();
  };
})();

function confirmCard() {
  if (!cardBox || (cardBox.x2 - cardBox.x1) < 10) {
    statusDiv.textContent = 'Dessine dabord un rectangle autour de la carte !';
    return;
  }
  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('btn-measure').style.display = 'inline-block';
  statusDiv.textContent = 'Carte confirmée — clique sur Mesurer !';
  instrDiv.textContent  = '';
}

// ── Mesure ────────────────────────────────────────────────────
function measure() {
  if (!bagBox)  { statusDiv.textContent = 'Aucun bagage détecté sur cette photo.'; return; }

  let ratio;
  let referenceText;
  if (cardBox) {
    const cardWpx = cardBox.x2 - cardBox.x1;
    const cardHpx = cardBox.y2 - cardBox.y1;
    ratio = ((cardWpx / CARD_W_MM) + (cardHpx / CARD_H_MM)) / 2;
    referenceText = 'Carte bancaire';
  } else if (ballBox) {
    const ballWpx = ballBox.x2 - ballBox.x1;
    const ballHpx = ballBox.y2 - ballBox.y1;
    ratio = ((ballWpx / BALL_D_MM) + (ballHpx / BALL_D_MM)) / 2;
    referenceText = 'Ballon de foot';
  } else {
    statusDiv.textContent = 'Sélectionne dabord la carte ou assure-toi qu’un ballon est détecté !';
    return;
  }

  const bagWcm = ((bagBox.x2 - bagBox.x1) / ratio / 10).toFixed(1);
  const bagHcm = ((bagBox.y2 - bagBox.y1) / ratio / 10).toFixed(1);
  const extraInfo = `Confiance YOLO : ${Math.round(bagBox.score * 100)}% — référence : ${referenceText}${!cardBox && ballBox ? ' (ballon ~22cm)' : ''}`;

  document.getElementById('res-class').textContent = CLASS_INFO[bagBox.cls].label;
  document.getElementById('res-dims').textContent  = `${bagWcm} × ${bagHcm}`;
  document.getElementById('conf').textContent      = extraInfo;
  document.getElementById('result').style.display  = 'block';

  statusDiv.textContent = 'Mesure terminée !';
  instrDiv.textContent  = 'Vérifie avec un mètre et reprends si nécessaire';
}

// ── Reprendre ─────────────────────────────────────────────────
function retake() {
  cardBox = null; bagBox = null; ballBox = null; photoImg = null; detectionBoxes = [];
  canvasPhoto.style.display = 'none';
  canvasLive.style.display  = 'block';
  video.style.display       = 'block';
  video.play();

  document.getElementById('btn-capture').style.display = 'inline-block';
  document.getElementById('btn-retake').style.display  = 'none';
  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('btn-measure').style.display = 'none';
  document.getElementById('result').style.display      = 'none';

  statusDiv.textContent = 'Modèle prêt — pointe vers ton bagage';
  instrDiv.textContent  = 'Place la carte bancaire à côté du bagage puis capture';
  detectLoop();
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await setupCamera();
  await loadModel();
}
init();
</script>
</body>
</html>
