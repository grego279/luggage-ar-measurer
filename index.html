<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesure Bagage</title>

  <!-- COCO-SSD charge TensorFlow.js lui-même, plus besoin de le charger séparément -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #13002F; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    h2 { font-size: 18px; font-weight: 500; padding: 14px 0 4px; }

    #status { color: #ff3fa5; font-weight: bold; font-size: 13px; min-height: 20px; text-align: center; padding: 0 16px 8px; }

    #container { position: relative; width: 100vw; flex: 1; }
    video, #canvas-live, #canvas-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas-photo { display: none; }

    #btn-bar {
      width: 100%; display: flex; justify-content: center;
      gap: 10px; padding: 12px 16px;
      background: rgba(19,0,47,0.95);
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      border: none; border-radius: 8px; cursor: pointer;
    }
    #btn-capture { background: #4CAF50; color: white; }
    #btn-retake  { background: #888;    color: white; }
    #btn-measure { background: #FF9800; color: white; }

    #result {
      width: 100%; background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 14px 20px; display: none;
      text-align: center;
    }
    #result h3 { font-size: 16px; margin-bottom: 8px; color: #FF3FA6; }
    .dim-row { font-size: 22px; font-weight: 500; margin: 4px 0; }
    .dim-label { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    #conf { font-size: 12px; color: #888; }

    #instr { font-size: 12px; color: #ccc; text-align: center; padding: 4px 16px 0; min-height: 18px; }

    #legend { display: flex; gap: 16px; padding: 6px 16px; font-size: 12px; color: #ccc; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }

    #cabin-check { padding: 6px 12px; border-radius: 8px; display: inline-block; margin-top: 6px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Mesure Bagage</h2>
<div id="status">Chargement du modèle...</div>
<div id="instr"></div>

<div id="container" style="height: 60vh;">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas-live"></canvas>
  <canvas id="canvas-photo"></canvas>
</div>

<div id="legend">
  <span><span class="legend-dot" style="background:#00E5FF"></span>Objet à mesurer</span>
  <span><span class="legend-dot" style="background:#FF3FA6"></span>Référence (ballon ⚽)</span>
</div>

<div id="btn-bar">
  <button id="btn-capture" onclick="capturePhoto()">📸 Capturer</button>
  <button id="btn-retake"  onclick="retake()"       style="display:none">🔄 Reprendre</button>
  <button id="btn-measure" onclick="measure()"      style="display:none">📏 Mesurer</button>
</div>

<div id="result">
  <h3 id="res-class"></h3>
  <div class="dim-row" id="res-dims"></div>
  <div class="dim-label">largeur × hauteur (cm)</div>
  <div id="cabin-check" style="font-size:18px; margin-top:8px;"></div>
  <div id="conf"></div>
</div>

<script>
const video       = document.getElementById('video');
const canvasLive  = document.getElementById('canvas-live');
const canvasPhoto = document.getElementById('canvas-photo');
const ctxLive     = canvasLive.getContext('2d');
const ctxPhoto    = canvasPhoto.getContext('2d');
const statusDiv   = document.getElementById('status');
const instrDiv    = document.getElementById('instr');

// ── Classes COCO-SSD ──────────────────────────────────────────
// COCO-SSD retourne des STRINGS et non des IDs numériques comme YOLO
// C'est la différence fondamentale avec l'ancien code
const BAG_CLASSES  = ['backpack', 'suitcase', 'refrigerator'];
const BALL_CLASS   = 'sports ball';

// Couleur et label pour chaque classe
const CLASS_INFO = {
  'backpack'     : { label: 'Sac à dos',      color: '#00E5FF' },
  'suitcase'     : { label: 'Valise',          color: '#00E5FF' },
  'refrigerator' : { label: 'Réfrigérateur',  color: '#00E5FF' },
  'sports ball'  : { label: 'Ballon ⚽',       color: '#FF3FA6' },
};

// ── Mesure de référence ───────────────────────────────────────
const BALL_D_MM    = 220.0;
const CABIN_MAX_W_CM = 55;
const CABIN_MAX_H_CM = 35;

// ── État de l'application ─────────────────────────────────────
let model          = null;  // le modèle COCO-SSD
let animId         = null;  // ID de la boucle d'animation
let lastDetections = [];    // dernières détections temps réel
let photoImg       = null;  // image figée après capture
let bagBox         = null;  // meilleur bagage détecté
let ballBox        = null;  // meilleur ballon détecté
let detectionBoxes = [];    // toutes les détections sur la photo

// ── Caméra ────────────────────────────────────────────────────
async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  return new Promise(r => video.onloadedmetadata = r);
}

// ── Modèle ────────────────────────────────────────────────────
async function loadModel() {
  try {
    // COCO-SSD : une seule ligne pour tout charger — pas de fichiers locaux !
    model = await cocoSsd.load();
    statusDiv.textContent = 'Modèle coco prêt — pointe vers ton bagage';
    instrDiv.textContent  = 'Place le ballon ⚽ à côté du bagage puis capture';
    detectLoop();
  } catch(e) {
    statusDiv.textContent = 'Erreur chargement modèle : ' + e;
  }
}

// ── Détection en temps réel ───────────────────────────────────
function detectLoop() {
  canvasLive.width  = video.videoWidth  || 640;
  canvasLive.height = video.videoHeight || 480;

  async function frame() {
    if (!model || video.paused || video.ended) {
      animId = requestAnimationFrame(frame);
      return;
    }
    try {
      // GROS CHANGEMENT : avec COCO-SSD on passe directement la video
      // Plus besoin de redimensionner, normaliser, transposer comme avec YOLO !
      // model.detect() fait tout ça en interne et retourne directement :
      // [ { class: 'suitcase', score: 0.92, bbox: [x, y, width, height] }, ... ]
      const predictions = await model.detect(video);

      // On filtre pour garder seulement nos classes utiles
      const dets = predictions.filter(p =>
        (BAG_CLASSES.includes(p.class) || p.class === BALL_CLASS) && p.score > 0.1
      );

      lastDetections = dets;
      renderLive(dets);
    } catch(e) {}

    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

// ── Affichage temps réel ──────────────────────────────────────
function renderLive(dets) {
  ctxLive.clearRect(0, 0, canvasLive.width, canvasLive.height);

  // COCO-SSD retourne bbox en coordonnées vidéo natives
  // Plus besoin de multiplier par sx/sy comme avec YOLO !
  // Mais le canvas CSS est étiré → on calcule quand même le ratio d'affichage
  const sx = canvasLive.width  / video.videoWidth;
  const sy = canvasLive.height / video.videoHeight;

  const hasBall = dets.some(d => d.class === BALL_CLASS);
  const hasBag  = dets.some(d => BAG_CLASSES.includes(d.class));

  dets.forEach(d => {
    // COCO-SSD : bbox = [x, y, width, height] — différent de YOLO qui donnait [y1,x1,y2,x2]
    const [x, y, w, h] = d.bbox;
    const x1 = x * sx, y1 = y * sy;
    const bw = w * sx, bh = h * sy;

    const info  = CLASS_INFO[d.class];
    const label = `${info.label} ${Math.round(d.score * 100)}%`;

    // Rectangle
    ctxLive.strokeStyle = info.color;
    ctxLive.lineWidth   = d.class === BALL_CLASS ? 4 : 3;
    ctxLive.strokeRect(x1, y1, bw, bh);

    // Label
    ctxLive.font = 'bold 15px sans-serif';
    const tw = ctxLive.measureText(label).width;
    ctxLive.fillStyle = info.color;
    ctxLive.fillRect(x1, y1 > 22 ? y1 - 22 : 0, tw + 10, 20);
    ctxLive.fillStyle = '#000';
    ctxLive.fillText(label, x1 + 5, y1 > 22 ? y1 - 5 : 15);
  });

  // Messages contextuels
  if (hasBall && hasBag) {
    statusDiv.textContent = '✅ Ballon + bagage détectés — capture !';
    statusDiv.style.color = '#00FF99';
  } else if (hasBall) {
    statusDiv.textContent = '⚽ Ballon détecté — place une valise ou un sac';
    statusDiv.style.color = '#FF3FA6';
  } else if (hasBag) {
    statusDiv.textContent = '🧳 Bagage détecté — place un ballon taille 5';
    statusDiv.style.color = '#00E5FF';
  } else {
    statusDiv.textContent = 'Pointe vers ton bagage et un ballon ⚽';
    statusDiv.style.color = '#888';
  }
}

// ── Capture photo ─────────────────────────────────────────────
function capturePhoto() {
  cancelAnimationFrame(animId);
  video.pause();

  canvasPhoto.width  = video.videoWidth;
  canvasPhoto.height = video.videoHeight;
  ctxPhoto.drawImage(video, 0, 0);

  photoImg = new Image();
  photoImg.src = canvasPhoto.toDataURL();

  bagBox  = null;
  ballBox = null;
  detectionBoxes = [];

  if (lastDetections.length > 0) {
    // COCO-SSD : on convertit bbox [x,y,w,h] en format {x1,y1,x2,y2}
    // pour rester cohérent avec le reste du code
    detectionBoxes = lastDetections.map(d => {
      const [x, y, w, h] = d.bbox;
      return {
        x1   : x,
        y1   : y,
        x2   : x + w,   // ← COCO-SSD donne largeur, on calcule x2
        y2   : y + h,   // ← COCO-SSD donne hauteur, on calcule y2
        cls  : d.class, // string ici, pas un nombre
        score: d.score
      };
    });

    const ballDets = detectionBoxes.filter(d => d.cls === BALL_CLASS);
    if (ballDets.length > 0) {
      ballBox = ballDets.reduce((a, b) => b.score > a.score ? b : a);
    }

    const bagDets = detectionBoxes.filter(d => BAG_CLASSES.includes(d.cls));
    if (bagDets.length > 0) {
      bagBox = bagDets.reduce((a, b) => b.score > a.score ? b : a);
    }

    drawDetections();
  }

  video.style.display       = 'none';
  canvasLive.style.display  = 'none';
  canvasPhoto.style.display = 'block';

  document.getElementById('btn-capture').style.display = 'none';
  document.getElementById('btn-retake').style.display  = 'inline-block';
  document.getElementById('btn-measure').style.display = (ballBox && bagBox) ? 'inline-block' : 'none';

  if (bagBox && ballBox) {
    statusDiv.textContent = `✅ ${CLASS_INFO[bagBox.cls].label} + ballon détectés — appuie sur Mesurer !`;
    statusDiv.style.color = '#00FF99';
  } else if (!ballBox) {
    statusDiv.textContent = '❌ Pas de ballon détecté — reprends avec un ballon taille 5';
    statusDiv.style.color = '#FF3FA6';
  } else {
    statusDiv.textContent = '❌ Pas de bagage détecté — reprends';
    statusDiv.style.color = '#FF3FA6';
  }
}

// ── Dessin sur la photo figée ─────────────────────────────────
function drawDetections() {
  detectionBoxes.forEach(d => {
    const info = CLASS_INFO[d.cls];

    ctxPhoto.strokeStyle = info.color;
    ctxPhoto.lineWidth   = d.cls === BALL_CLASS ? 5 : 3;
    ctxPhoto.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);

    const label = `${info.label} ${Math.round(d.score * 100)}%`;
    ctxPhoto.font = 'bold 18px sans-serif';
    const tw = ctxPhoto.measureText(label).width;
    ctxPhoto.fillStyle = info.color;
    ctxPhoto.fillRect(d.x1, d.y1 > 26 ? d.y1 - 26 : 0, tw + 10, 24);
    ctxPhoto.fillStyle = '#000';
    ctxPhoto.fillText(label, d.x1 + 5, d.y1 > 26 ? d.y1 - 5 : 19);

    if (d.cls === BALL_CLASS) {
      ctxPhoto.font = '22px sans-serif';
      ctxPhoto.fillText('📐', d.x1 + 4, d.y2 - 6);
    }
  });
}

// ── Mesure ────────────────────────────────────────────────────
function measure() {
  if (!ballBox) { statusDiv.textContent = '❌ Pas de ballon détecté !'; return; }
  if (!bagBox)  { statusDiv.textContent = '❌ Pas de bagage détecté !'; return; }

  const ballWpx = ballBox.x2 - ballBox.x1;
  const ballHpx = ballBox.y2 - ballBox.y1;
  const ratio   = ((ballWpx / BALL_D_MM) + (ballHpx / BALL_D_MM)) / 2;

  const bagWcm = ((bagBox.x2 - bagBox.x1) / ratio / 10).toFixed(1);
  const bagHcm = ((bagBox.y2 - bagBox.y1) / ratio / 10).toFixed(1);

  const fitsCabin = bagWcm <= CABIN_MAX_W_CM && bagHcm <= CABIN_MAX_H_CM;
  const cabinDiv  = document.getElementById('cabin-check');

  if (fitsCabin) {
    cabinDiv.textContent      = '✅ Accepté comme bagage cabine';
    cabinDiv.style.background = 'rgba(0,255,100,0.15)';
    cabinDiv.style.color      = '#00FF99';
  } else {
    cabinDiv.textContent      = '❌ Trop grand pour la cabine';
    cabinDiv.style.background = 'rgba(255,60,60,0.15)';
    cabinDiv.style.color      = '#FF5555';
  }

  document.getElementById('res-class').textContent = CLASS_INFO[bagBox.cls].label;
  document.getElementById('res-dims').textContent  = `${bagWcm} × ${bagHcm}`;
  document.getElementById('conf').textContent      = `Confiance : ${Math.round(bagBox.score * 100)}% — référence ballon ⚽ (22cm)`;
  document.getElementById('result').style.display  = 'block';

  statusDiv.textContent = '📏 Mesure terminée !';
  statusDiv.style.color = '#00FF99';
}

// ── Reprendre ─────────────────────────────────────────────────
function retake() {
  bagBox = null; ballBox = null; photoImg = null; detectionBoxes = [];

  canvasPhoto.style.display = 'none';
  canvasLive.style.display  = 'block';
  video.style.display       = 'block';
  video.play();

  document.getElementById('btn-capture').style.display = 'inline-block';
  document.getElementById('btn-retake').style.display  = 'none';
  document.getElementById('btn-measure').style.display = 'none';
  document.getElementById('result').style.display      = 'none';
  document.getElementById('cabin-check').textContent   = '';

  statusDiv.textContent = 'Pointe vers ton bagage et un ballon ⚽';
  statusDiv.style.color = '#888';

  detectLoop();
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await setupCamera();
  await loadModel();
}
init();
</script>
</body>
</html>
